<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sleep Detector</title>

    <!-- ONNX Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #34C759;
        }

        .container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 2px solid #555;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        video,
        canvas#overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }

        canvas#overlay {
            z-index: 10;
            pointer-events: none;
        }

        #status {
            margin-top: 15px;
            padding: 10px;
            width: 600px;
            text-align: center;
            border-radius: 5px;
            background: #1e1e1e;
            border: 1px solid #444;
            font-weight: bold;
        }

        .btn-start {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #FF3B30;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;

            /* supaya tombol bisa diklik */
            position: relative;
            z-index: 999;
        }

        .btn-start:hover {
            background: #cc2f26;
        }
    </style>
</head>
<body>

    <h1>😴 AI Sleep Detector</h1>
    <p>Dibuat oleh: Raisya Rizky | Nadia | Farefta</p>

    <button id="btn-init" class="btn-start">
        AKTIFKAN KAMERA
    </button>

    <div id="status">
        STATUS: MATI
    </div>

    <div class="container">

        <!-- Kamera -->
        <video
            id="webcam"
            autoplay
            playsinline
            muted>
        </video>

        <!-- Kotak Deteksi -->
        <canvas
            id="overlay"
            width="640"
            height="480">
        </canvas>
    </div>

    <!-- Processor Canvas -->
    <canvas
        id="processor"
        width="640"
        height="640"
        style="display:none;">
    </canvas>

    <!-- File AI -->
    <script src="app.js"></script>

</body>
</html>
